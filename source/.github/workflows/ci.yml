# CI workflow for opencode-mem
# Triggers on push to main or pull requests against main.
name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.93.1
        with:
          components: rustfmt
          
      - name: Check code formatting
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.93.1
        with:
          components: clippy
          
      - name: Setup Rust caching
        uses: Swatinem/rust-cache@v2
        
      - name: Run clippy checks across workspace
        run: cargo clippy --workspace -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.93.1
        
      - name: Setup Rust caching
        uses: Swatinem/rust-cache@v2
        
      - name: Run unit tests
        # Runs unit tests only (no DB needed). Skips #[ignore] tests by default.
        run: cargo test --workspace

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.93.1
        
      - name: Setup Rust caching
        uses: Swatinem/rust-cache@v2
        
      - name: Build release binaries
        run: cargo build --workspace --release

  msrv:
    name: MSRV
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Install MSRV toolchain (1.88.0)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.88.0
          
      - name: Setup Rust caching
        uses: Swatinem/rust-cache@v2
        
      - name: Check workspace against MSRV
        run: cargo check --workspace
